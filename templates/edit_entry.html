{% extends "base.html" %}

{% block title %}Editar Entrada - StockFlow{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title">
        <h2>Editar Entrada de Produto</h2>
    </div>
</div>

<div class="glass-panel">
    <form action="{{ url_for('edit_entry', entry_id=entry.id) }}" method="POST" autocomplete="off" id="editEntryForm" role="form" aria-label="Formulário de Edição de Entrada de Produto">
        <div class="form-grid">
            <!-- Data de Entrada -->
            <div class="form-group">
                <label for="entry_date" class="form-label">Data de Entrada</label>
                <input type="date" id="entry_date" name="entry_date" class="form-input" required value="{{ entry.entry_date }}">
            </div>
            <!-- Tipo de SSD -->
            <div class="form-group">
                <label for="ssd_type" class="form-label">Tipo de SSD</label>
                <select id="ssd_type" name="ssd_type" class="form-select" required>
                    <option value="" disabled>Selecione o tipo</option>
                    <option value="SATA" {% if entry.ssd_type == 'SATA' %}selected{% endif %}>SATA (2.5" ou M.2)</option>
                    <option value="NVMe" {% if entry.ssd_type == 'NVMe' %}selected{% endif %}>NVMe (M.2 PCIe)</option>
                </select>
            </div>
            <!-- Marca -->
            <div class="form-group">
                <label for="brand" class="form-label">Marca</label>
                <input type="text" id="brand" name="brand" class="form-input" placeholder="Ex: Kingston, Crucial, XPG" required value="{{ entry.brand }}">
            </div>
            <!-- Tamanho (Opcional) -->
            <div class="form-group">
                <label for="size" class="form-label">Tamanho (Opcional)</label>
                <input type="text" id="size" name="size" class="form-input" placeholder="Ex: 240GB, 480GB, 1TB" value="{{ entry.size }}">
            </div>
            <!-- Quantidade -->
            <div class="form-group">
                <label for="quantity" class="form-label">Quantidade</label>
                <input type="number" id="quantity" name="quantity" class="form-input" min="1" required value="{{ entry.quantity }}">
            </div>
            <!-- Fornecedor -->
            <div class="form-group">
                <label for="supplier" class="form-label">Fornecedor</label>
                <input type="text" id="supplier" name="supplier" class="form-input" placeholder="Nome do Fornecedor" required value="{{ entry.supplier }}">
            </div>
            <!-- Preço Unitário -->
            <div class="form-group">
                <label for="price" class="form-label">Preço Unitário (R$)</label>
                <input type="number" id="price" name="price" class="form-input" min="0.01" step="0.01" required value="{{ entry.price }}">
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-save" aria-hidden="true"></i> Atualizar Entrada
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Set default date to the existing entry date (if browser format differs)
    document.addEventListener('DOMContentLoaded', function() {
        const dateInput = document.getElementById('entry_date');
        if (dateInput && dateInput.value) {
            // Ensure value is in YYYY-MM-DD format
            const parts = dateInput.value.split('-');
            if (parts.length === 3) {
                dateInput.value = parts.join('-');
            }
        }
    });
</script>
{% endblock %}
